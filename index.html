<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collector</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #1a1a2e;
    --border: #2a2a3e;
    --text: #e8e0d0;
    --muted: #888;
    --dim: #444;
    --gold: #C9A96E;
    --teal: #7EB8A4;
    --red: #E07B6A;
    --font: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }
  #app { height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* layout */
  .header { padding: 20px 28px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 24px; font-weight: 400; letter-spacing: 3px; }
  .header h1 span { color: var(--gold); }
  .header-meta { color: var(--dim); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; display: flex; align-items: center; gap: 8px; }
  .server-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .add-btn { background: var(--gold); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(201,169,110,0.3); display: flex; align-items: center; justify-content: center; transition: transform 0.15s; }
  .add-btn:hover { transform: scale(1.08); }

  .tabs { display: flex; padding: 16px 28px 0; flex-shrink: 0; border-bottom: 1px solid var(--border); margin-top: 8px; }
  .tab { padding: 10px 0; margin-right: 28px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); cursor: pointer; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; font-family: var(--font); transition: all 0.2s; }
  .tab.active { border-bottom-color: var(--gold); color: var(--gold); }
  .tab:hover:not(.active) { color: var(--muted); }

  .content { flex: 1; overflow-y: auto; padding: 24px 28px; min-height: 0; }
  .map-wrap { flex: 1; min-height: 0; }
  #map { width: 100%; height: 100%; }

  /* search + filters */
  .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
  .search { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; color: var(--text); font-size: 14px; font-family: var(--font); outline: none; }
  .search:focus { border-color: var(--gold); }
  .filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; font-size: 12px; font-family: var(--font); transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--muted); color: var(--muted); }

  /* grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--surface2); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .card-img { aspect-ratio: 1; background: #050510; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; font-size: 44px; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .dual-badge { position: absolute; bottom: 6px; right: 6px; background: rgba(126,184,164,0.9); border-radius: 4px; padding: 2px 6px; font-size: 9px; color: #0a0a14; font-weight: 700; letter-spacing: 0.5px; }
  .card-info { padding: 12px; }
  .card-cat { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
  .card-title { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .card-brand { font-size: 11px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }

  /* empty */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 80px 20px; }
  .empty-icon { font-size: 64px; opacity: 0.2; }
  .empty p { color: var(--dim); font-size: 15px; text-align: center; line-height: 1.7; }

  /* modals */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.bottom { align-items: flex-end; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 28px; position: relative; }
  .modal.sheet { border-radius: 20px 20px 0 0; max-width: 640px; max-height: 85vh; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 24px; }
  .modal-close { position: absolute; top: 18px; right: 18px; background: none; border: none; color: var(--dim); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; }
  .modal-close:hover { color: var(--muted); }
  .modal h2 { font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
  .modal .subtitle { color: var(--dim); font-size: 13px; margin-bottom: 24px; line-height: 1.5; }

  /* form */
  label.field-label { display: block; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; margin-top: 14px; }
  input.field, textarea.field { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.2s; }
  input.field:focus, textarea.field:focus { border-color: var(--gold); }
  textarea.field { resize: vertical; }
  .cat-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 7px; }
  .cat-pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; font-size: 12px; font-family: var(--font); transition: all 0.2s; }

  /* image slots */
  .slots { display: flex; gap: 14px; margin-bottom: 20px; }
  .slot { flex: 1; }
  .slot-label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
  .slot-box { width: 100%; aspect-ratio: 1; border-radius: 10px; border: 2px dashed var(--border); background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s; }
  .slot-box:hover { border-color: var(--muted); }
  .slot-upload-btn { padding: 7px 18px; border-radius: 6px; border: 1px solid var(--gold); background: rgba(201,169,110,0.1); color: var(--gold); font-size: 12px; cursor: pointer; font-family: var(--font); transition: all 0.2s; }
  .slot-upload-btn:hover { background: rgba(201,169,110,0.2); }
  .slot-upload-btn.secondary { border-color: var(--teal); background: rgba(126,184,164,0.1); color: var(--teal); }
  .slot-upload-btn.secondary:hover { background: rgba(126,184,164,0.2); }
  .slot-preview { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1; }
  .slot-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .slot-clear { position: absolute; top: 7px; right: 7px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; width: 26px; height: 26px; color: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .slot-ok { position: absolute; bottom: 6px; left: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; background: rgba(0,0,0,0.65); padding: 2px 7px; border-radius: 4px; }

  /* banners */
  .banner { border-radius: 8px; padding: 11px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; line-height: 1.4; }
  .banner.green { background: rgba(126,184,164,0.08); border: 1px solid rgba(126,184,164,0.25); color: var(--teal); }
  .banner.amber { background: rgba(201,169,110,0.07); border: 1px solid rgba(201,169,110,0.2); color: var(--muted); }
  .banner.red { background: rgba(224,123,106,0.08); border: 1px solid rgba(224,123,106,0.25); color: var(--red); }

  /* buttons */
  .btn { width: 100%; padding: 13px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-family: var(--font); font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: var(--gold); color: #0a0a14; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:disabled { background: var(--surface2); color: var(--dim); cursor: not-allowed; filter: none; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--muted); }
  .btn-danger { background: transparent; border: 1px solid rgba(224,123,106,0.3); color: var(--red); }
  .btn-danger:hover { background: rgba(224,123,106,0.07); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn-row .btn { flex: 1; }
  .btn-row .btn-primary { flex: 2; }

  /* spinner */
  .analyzing { text-align: center; padding: 56px 0; }
  .spinner { font-size: 52px; display: inline-block; animation: spin 1.2s linear infinite; margin-bottom: 18px; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .analyzing p { color: var(--muted); font-size: 15px; margin-bottom: 6px; }
  .analyzing small { color: var(--dim); font-size: 12px; }

  /* detail */
  .detail-imgs { display: flex; gap: 10px; margin-bottom: 22px; }
  .detail-imgs img { border-radius: 12px; object-fit: contain; background: #050510; max-height: 300px; }
  .detail-tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 14px; border-radius: 20px; font-size: 12px; margin-right: 7px; margin-bottom: 10px; }
  .detail-h2 { font-size: 24px; font-weight: 400; margin-bottom: 6px; line-height: 1.3; }
  .detail-brand { color: var(--muted); font-size: 15px; margin-bottom: 18px; }
  .detail-desc { color: #aaa; font-size: 14px; line-height: 1.75; margin-bottom: 18px; }
  .raw-box { background: #0a0a15; border: 1px solid var(--surface2); border-radius: 8px; padding: 14px; margin-bottom: 18px; }
  .raw-label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
  .raw-box pre { color: #666; font-size: 12px; white-space: pre-wrap; font-family: 'Monaco', monospace; line-height: 1.6; }
  .notes-box { border-left: 3px solid var(--gold); padding-left: 14px; margin-bottom: 18px; }
  .notes-label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .notes-box p { color: #ccc; font-size: 14px; line-height: 1.6; }
  .detail-meta { color: #333; font-size: 12px; margin-bottom: 22px; line-height: 1.8; }

  .map-notice { padding: 14px 28px; background: var(--surface2); border-bottom: 1px solid var(--border); color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY = 'collector_v3';
const SERVER_URL  = 'http://127.0.0.1:1234';
const MODEL_ID    = 'qwen/qwen2.5-vl-7b';

const CATS = {
  Art:      { color: '#C9A96E', icon: '🖼' },
  Antiques: { color: '#B5956A', icon: '🏺' },
  Other:    { color: '#8899AA', icon: '📦' },
};

// ── Storage ───────────────────────────────────────────────────────────────────
function loadItems() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
function saveItems(items) { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  tab: 'collection',
  items: loadItems(),
  search: '',
  filterCat: 'All',
  modal: null,
  selectedItem: null,
  serverOnline: null,
  scan: { step: 'capture', primary: null, secondary: null, edit: null, error: null }
};

// ── Server check ──────────────────────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch(`${SERVER_URL}/v1/models`, { signal: AbortSignal.timeout(2500) });
    state.serverOnline = r.ok;
  } catch { state.serverOnline = false; }
  render();
}

// ── AI ────────────────────────────────────────────────────────────────────────
async function analyzeImages(primary, primaryMime, secondary, secondaryMime) {
  const hasBoth = primary && secondary;
  const systemPrompt = hasBoth
    ? `You are an expert object and artwork identifier. You are given TWO images: the first is the item/artwork itself, the second is its label or placard. Use BOTH for maximum accuracy. Extract all label text. Return ONLY a raw JSON object (no markdown, no backticks): {"title":"...","category":"Art|Antiques|Other","brand":"...","year":"...","description":"...","rawText":"..."}`
    : `You are a universal object identification expert. Identify the item in the photo. Return ONLY a raw JSON object (no markdown, no backticks): {"title":"...","category":"Art|Antiques|Other","brand":"...","year":"...","description":"..."}`;

  const content = [
    { type: 'image_url', image_url: { url: `data:${primaryMime};base64,${primary}` } }
  ];
  if (hasBoth) content.push({ type: 'image_url', image_url: { url: `data:${secondaryMime};base64,${secondary}` } });
  content.push({ type: 'text', text: hasBoth ? 'Identify using both images.' : 'Identify this item.' });

  const response = await fetch(`${SERVER_URL}/v1/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL_ID,
      max_tokens: 800,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content }
      ]
    })
  });
  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || '{}';
  try { return JSON.parse(text.replace(/```json|```/g, '').trim()); }
  catch { return { title: 'Unknown Item', category: 'Other', description: text }; }
}

function readFileAsBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res({ data: e.target.result.split(',')[1], mime: file.type || 'image/jpeg', dataUrl: e.target.result });
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ── Map ───────────────────────────────────────────────────────────────────────
let mapInstance = null;
function initMap() {
  const el = document.getElementById('map');
  if (!el || mapInstance) return;
  mapInstance = L.map('map').setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(mapInstance);
  renderMarkers();
}
function destroyMap() { if (mapInstance) { mapInstance.remove(); mapInstance = null; } }
function renderMarkers() {
  if (!mapInstance) return;
  mapInstance.eachLayer(l => { if (l instanceof L.Marker) mapInstance.removeLayer(l); });
  const geo = state.items.filter(i => i.lat && i.lng);
  geo.forEach(item => {
    const c = CATS[item.category]?.color || '#8899AA';
    const ic = CATS[item.category]?.icon || '📦';
    const icon = L.divIcon({ className: '', html: `<div style="background:${c};width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 12px rgba(0,0,0,0.5);border:2px solid white">${ic}</div>`, iconSize:[36,36], iconAnchor:[18,18] });
    L.marker([item.lat, item.lng], { icon }).addTo(mapInstance)
      .bindPopup(`<div style="font-family:serif;min-width:140px"><strong style="font-size:14px">${item.title}</strong><br><span style="color:#666;font-size:12px">${item.category}</span>${item.brand?`<br><span style="font-size:12px">${item.brand}</span>`:''}</div>`);
  });
  if (geo.length > 1) mapInstance.fitBounds(L.featureGroup(geo.map(i => L.marker([i.lat,i.lng]))).getBounds().pad(0.2));
  else if (geo.length === 1) mapInstance.setView([geo[0].lat, geo[0].lng], 13);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = '';
  document.getElementById('app').appendChild(buildApp());
  if (state.tab === 'map') setTimeout(() => { initMap(); renderMarkers(); }, 50);
  else destroyMap();
}

function buildApp() {
  const wrap = d('div', 'height:100vh;display:flex;flex-direction:column');

  // Header
  const hdr = n('div', 'header');
  const htitle = n('div');
  const h1 = n('h1'); h1.innerHTML = '<span>✦</span> COLLECTOR'; htitle.appendChild(h1);
  const hmeta = n('div', 'header-meta');
  const dot = n('span', 'server-dot');
  dot.style.background = state.serverOnline === true ? '#6BAE75' : state.serverOnline === false ? '#E07B6A' : '#555';
  hmeta.appendChild(dot);
  hmeta.appendChild(t(state.serverOnline === true ? 'LM Studio connected' : state.serverOnline === false ? 'LM Studio offline' : 'checking…'));
  hmeta.appendChild(t(' · ' + state.items.length + ' item' + (state.items.length !== 1 ? 's' : '')));
  htitle.appendChild(hmeta);
  const addBtn = n('button', 'add-btn'); addBtn.textContent = '+'; addBtn.onclick = openScanner;
  hdr.appendChild(htitle); hdr.appendChild(addBtn); wrap.appendChild(hdr);

  // Tabs
  const tabs = n('div', 'tabs');
  [['collection','Collection'],['map','Map']].forEach(([v,l]) => {
    const tb = n('button', 'tab' + (state.tab === v ? ' active' : ''));
    tb.textContent = l; tb.onclick = () => { state.tab = v; render(); };
    tabs.appendChild(tb);
  });
  wrap.appendChild(tabs);

  // Content
  if (state.tab === 'collection') wrap.appendChild(buildCollection());
  else wrap.appendChild(buildMap());

  // Modals
  if (state.modal === 'scanner') wrap.appendChild(buildScannerModal());
  if (state.modal === 'detail' && state.selectedItem) wrap.appendChild(buildDetailModal(state.selectedItem));

  return wrap;
}

// ── Collection ────────────────────────────────────────────────────────────────
function buildCollection() {
  const wrap = n('div', 'content');

  const toolbar = n('div', 'toolbar');
  const search = document.createElement('input');
  search.className = 'search'; search.placeholder = 'Search collection…'; search.value = state.search;
  search.oninput = e => { state.search = e.target.value; render(); };
  toolbar.appendChild(search); wrap.appendChild(toolbar);

  const filters = n('div', 'filters');
  ['All', ...Object.keys(CATS)].forEach(c => {
    const active = state.filterCat === c;
    const color = CATS[c]?.color || '#C9A96E';
    const btn = n('button', 'filter-btn');
    btn.textContent = (c !== 'All' ? CATS[c].icon + ' ' : '') + c;
    if (active) btn.style.cssText = `border-color:${color};background:${color}22;color:${color}`;
    btn.onclick = () => { state.filterCat = c; render(); };
    filters.appendChild(btn);
  });
  wrap.appendChild(filters);

  const filtered = state.items.filter(i => {
    const mc = state.filterCat === 'All' || i.category === state.filterCat;
    const ms = !state.search || `${i.title} ${i.brand} ${i.description}`.toLowerCase().includes(state.search.toLowerCase());
    return mc && ms;
  });

  if (!filtered.length) {
    const empty = n('div', 'empty');
    empty.innerHTML = `<div class="empty-icon">✦</div><p>${state.items.length === 0 ? 'Your collection is empty.<br>Click + to scan your first item.' : 'No items match your search.'}</p>`;
    wrap.appendChild(empty);
  } else {
    const grid = n('div', 'grid');
    filtered.forEach(item => {
      const color = CATS[item.category]?.color || '#8899AA';
      const card = n('div', 'card');
      card.style.setProperty('--c', color);
      card.addEventListener('mouseenter', () => { card.style.borderColor = color + '66'; });
      card.addEventListener('mouseleave', () => { card.style.borderColor = ''; });
      card.onclick = () => { state.selectedItem = item; state.modal = 'detail'; render(); };
      const imgbox = n('div', 'card-img');
      if (item.imageData) { const img = document.createElement('img'); img.src = `data:${item.imageMime||'image/jpeg'};base64,${item.imageData}`; img.alt = item.title; imgbox.appendChild(img); }
      else imgbox.textContent = CATS[item.category]?.icon || '📦';
      if (item.signageData) { const b = n('div', 'dual-badge'); b.textContent = '✦ DUAL'; imgbox.appendChild(b); }
      const info = n('div', 'card-info');
      const cat = n('div', 'card-cat'); cat.style.color = color; cat.textContent = item.category; info.appendChild(cat);
      const title = n('div', 'card-title'); title.textContent = item.title; info.appendChild(title);
      if (item.brand) { const brand = n('div', 'card-brand'); brand.textContent = item.brand; info.appendChild(brand); }
      card.appendChild(imgbox); card.appendChild(info); grid.appendChild(card);
    });
    wrap.appendChild(grid);
  }
  return wrap;
}

// ── Map ───────────────────────────────────────────────────────────────────────
function buildMap() {
  const wrap = d('div', 'flex:1;min-height:0;display:flex;flex-direction:column');
  const geo = state.items.filter(i => i.lat && i.lng);
  if (!geo.length) { const notice = n('div', 'map-notice'); notice.textContent = '📍 No location data yet. Items scanned with location enabled will appear here.'; wrap.appendChild(notice); }
  const mapDiv = document.createElement('div'); mapDiv.id = 'map'; mapDiv.style.flex = '1';
  wrap.appendChild(mapDiv);
  return wrap;
}

// ── Scanner ───────────────────────────────────────────────────────────────────
function openScanner() { state.modal = 'scanner'; state.scan = { step: 'capture', primary: null, secondary: null, edit: null, error: null }; render(); }

function buildScannerModal() {
  const scan = state.scan;
  const bg = d('div', 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px');
  bg.onclick = e => { if (e.target === bg) closeScanner(); };
  const modal = n('div', 'modal');
  const closeBtn = n('button', 'modal-close'); closeBtn.textContent = '✕'; closeBtn.onclick = closeScanner; modal.appendChild(closeBtn);

  if (scan.step === 'capture') {
    const h2 = n('div'); h2.style.cssText = 'font-size:22px;font-weight:400;margin-bottom:6px'; h2.textContent = 'Scan Item';
    const sub = n('div', 'subtitle'); sub.textContent = 'Upload the artwork photo (required) and its label for best results.';
    modal.appendChild(h2); modal.appendChild(sub);

    const slots = n('div', 'slots');
    slots.appendChild(buildSlot('Item / Artwork', '🖼', scan.primary, 'primary', '#C9A96E', false));
    slots.appendChild(buildSlot('Label / Signage', '🏷', scan.secondary, 'secondary', '#7EB8A4', true));
    modal.appendChild(slots);

    if (scan.primary && scan.secondary) { const b = n('div', 'banner green'); b.innerHTML = '<span>✦</span> Both uploaded — AI will cross-reference artwork + label for maximum accuracy'; modal.appendChild(b); }
    else if (scan.primary) { const b = n('div', 'banner amber'); b.textContent = 'Add the label photo for significantly better results'; modal.appendChild(b); }
    if (scan.error) { const b = n('div', 'banner red'); b.textContent = scan.error; modal.appendChild(b); }

    const btn = document.createElement('button'); btn.className = 'btn btn-primary'; btn.disabled = !scan.primary;
    btn.textContent = scan.primary && scan.secondary ? 'Analyze Both Images →' : scan.primary ? 'Analyze Item →' : 'Upload artwork photo to continue';
    btn.onclick = doAnalyze; modal.appendChild(btn);
  }

  else if (scan.step === 'analyzing') {
    const a = n('div', 'analyzing');
    a.innerHTML = `<div class="spinner">✦</div><p>${scan.secondary ? 'Cross-referencing artwork + label…' : 'Identifying your item…'}</p><small>Qwen2.5-VL is thinking</small>`;
    modal.appendChild(a);
  }

  else if (scan.step === 'result' && scan.edit) {
    const e = scan.edit;
    const imgs = d('div', 'display:flex;gap:10px;margin-bottom:20px');
    if (scan.primary) { const img = document.createElement('img'); img.src = scan.primary.dataUrl; img.style.cssText = `flex:1;max-height:200px;border-radius:10px;object-fit:contain;background:#050510;border:1px solid var(--border);${scan.secondary?'':'width:100%'}`; imgs.appendChild(img); }
    if (scan.secondary) { const img = document.createElement('img'); img.src = scan.secondary.dataUrl; img.style.cssText = 'flex:1;max-height:200px;border-radius:10px;object-fit:contain;background:#050510;border:1px solid var(--border)'; imgs.appendChild(img); }
    modal.appendChild(imgs);

    modal.appendChild(fieldLbl('Title'));
    const titleIn = document.createElement('input'); titleIn.className = 'field'; titleIn.value = e.title || ''; titleIn.oninput = ev => scan.edit.title = ev.target.value; modal.appendChild(titleIn);

    modal.appendChild(fieldLbl('Category'));
    const pills = n('div', 'cat-pills');
    Object.keys(CATS).forEach(c => {
      const active = e.category === c; const color = CATS[c].color;
      const pill = document.createElement('button'); pill.className = 'cat-pill';
      if (active) pill.style.cssText = `border-color:${color};background:${color}22;color:${color}`;
      pill.textContent = CATS[c].icon + ' ' + c;
      pill.onclick = () => { scan.edit.category = c; render(); };
      pills.appendChild(pill);
    });
    modal.appendChild(pills);

    const row = d('div', 'display:flex;gap:12px');
    const bw = d('div', 'flex:2'); bw.appendChild(fieldLbl('Artist / Brand'));
    const bi = document.createElement('input'); bi.className = 'field'; bi.value = e.brand||''; bi.oninput = ev => scan.edit.brand = ev.target.value; bw.appendChild(bi);
    const yw = d('div', 'flex:1'); yw.appendChild(fieldLbl('Year'));
    const yi = document.createElement('input'); yi.className = 'field'; yi.value = e.year||''; yi.oninput = ev => scan.edit.year = ev.target.value; yw.appendChild(yi);
    row.appendChild(bw); row.appendChild(yw); modal.appendChild(row);

    modal.appendChild(fieldLbl('Description'));
    const desc = document.createElement('textarea'); desc.className = 'field'; desc.rows = 3; desc.value = e.description||''; desc.oninput = ev => scan.edit.description = ev.target.value; modal.appendChild(desc);

    if (e.rawText) { const rb = n('div', 'raw-box'); rb.style.marginTop = '14px'; rb.innerHTML = `<div class="raw-label">Extracted Label Text</div><pre>${e.rawText}</pre>`; modal.appendChild(rb); }

    modal.appendChild(fieldLbl('Personal Notes'));
    const notes = document.createElement('textarea'); notes.className = 'field'; notes.rows = 2; notes.placeholder = 'Where did you find this? Why does it matter?'; notes.value = e.notes||''; notes.oninput = ev => scan.edit.notes = ev.target.value; modal.appendChild(notes);

    const btnRow = n('div', 'btn-row');
    const rescan = document.createElement('button'); rescan.className = 'btn btn-ghost'; rescan.textContent = '← Rescan';
    rescan.onclick = () => { state.scan.step = 'capture'; state.scan.edit = null; render(); };
    const save = document.createElement('button'); save.className = 'btn btn-primary'; save.textContent = 'Save to Collection ✦'; save.onclick = saveItem;
    btnRow.appendChild(rescan); btnRow.appendChild(save); modal.appendChild(btnRow);
  }

  bg.appendChild(modal); return bg;
}

function buildSlot(label, icon, data, key, accent, optional) {
  const slot = n('div', 'slot');
  const lbl = n('div', 'slot-label'); lbl.textContent = label + (optional ? ' (optional)' : ''); slot.appendChild(lbl);
  if (data) {
    const prev = n('div', 'slot-preview'); prev.style.border = `1px solid ${accent}55`;
    const img = document.createElement('img'); img.src = data.dataUrl; prev.appendChild(img);
    const clr = n('button', 'slot-clear'); clr.textContent = '✕'; clr.onclick = () => { state.scan[key] = null; render(); }; prev.appendChild(clr);
    const ok = n('div', 'slot-ok'); ok.style.color = accent; ok.textContent = '✓ Uploaded'; prev.appendChild(ok);
    slot.appendChild(prev);
  } else {
    const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
    fileInput.onchange = async e => { if (e.target.files[0]) { state.scan[key] = await readFileAsBase64(e.target.files[0]); render(); } };
    const box = n('div', 'slot-box');
    const iconSpan = document.createElement('span'); iconSpan.style.fontSize = '32px'; iconSpan.textContent = icon; box.appendChild(iconSpan);
    const upBtn = document.createElement('button'); upBtn.className = 'slot-upload-btn' + (optional ? ' secondary' : '');
    upBtn.textContent = '🖼 Choose Image'; upBtn.onclick = () => fileInput.click(); box.appendChild(upBtn);
    slot.appendChild(box); slot.appendChild(fileInput);
  }
  return slot;
}

async function doAnalyze() {
  const scan = state.scan; scan.step = 'analyzing'; scan.error = null; render();
  try {
    const res = await analyzeImages(scan.primary.data, scan.primary.mime, scan.secondary?.data, scan.secondary?.mime);
    scan.edit = { title: res.title||'', category: res.category||'Other', brand: res.brand||'', year: res.year||'', description: res.description||'', rawText: res.rawText||'', notes: '' };
    scan.step = 'result';
  } catch {
    scan.error = 'Analysis failed. Is LM Studio running with Qwen2.5-VL loaded and the server active?';
    scan.step = 'capture';
  }
  render();
}

function saveItem() {
  const scan = state.scan; const e = scan.edit;
  const item = { id: Date.now().toString(), ...e, imageData: scan.primary.data, imageMime: scan.primary.mime, signageData: scan.secondary?.data||null, signageMime: scan.secondary?.mime||null, savedAt: new Date().toISOString() };
  state.items = [item, ...state.items]; saveItems(state.items);
  state.modal = null; state.tab = 'collection'; render();
}

function closeScanner() { state.modal = null; render(); }

// ── Detail ────────────────────────────────────────────────────────────────────
function buildDetailModal(item) {
  const color = CATS[item.category]?.color || '#8899AA';
  const bg = d('div', 'position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:flex-end;justify-content:center');
  bg.onclick = e => { if (e.target === bg) { state.modal = null; render(); } };
  const modal = n('div', 'modal sheet');

  const handle = n('div', 'modal-handle'); modal.appendChild(handle);

  const imgs = n('div', 'detail-imgs');
  if (item.imageData) { const img = document.createElement('img'); img.src = `data:${item.imageMime||'image/jpeg'};base64,${item.imageData}`; img.alt = item.title; img.style.cssText = item.signageData ? 'flex:1' : 'width:100%'; imgs.appendChild(img); }
  if (item.signageData) {
    const wrap = d('div', 'flex:1;display:flex;flex-direction:column;gap:6px');
    const img = document.createElement('img'); img.src = `data:${item.signageMime||'image/jpeg'};base64,${item.signageData}`; img.style.cssText = 'border-radius:10px;object-fit:contain;background:#050510;border:1px solid var(--border);flex:1;max-height:300px';
    const cap = d('div', 'color:var(--dim);font-size:10px;text-align:center;text-transform:uppercase;letter-spacing:1px'); cap.textContent = 'Label';
    wrap.appendChild(img); wrap.appendChild(cap); imgs.appendChild(wrap);
  }
  modal.appendChild(imgs);

  const tagRow = d('div', 'margin-bottom:10px');
  const catTag = n('span', 'detail-tag'); catTag.style.cssText = `background:${color}22;color:${color};border:1px solid ${color}44`; catTag.textContent = (CATS[item.category]?.icon||'') + ' ' + item.category; tagRow.appendChild(catTag);
  if (item.year) { const y = d('span', 'color:var(--dim);font-size:13px'); y.textContent = item.year; tagRow.appendChild(y); }
  if (item.signageData) { const ds = n('span', 'detail-tag'); ds.style.cssText = 'background:rgba(126,184,164,0.1);color:#7EB8A4;border:1px solid rgba(126,184,164,0.3);font-size:11px'; ds.textContent = '✦ dual scan'; tagRow.appendChild(ds); }
  modal.appendChild(tagRow);

  const h2 = n('div', 'detail-h2'); h2.textContent = item.title; modal.appendChild(h2);
  if (item.brand) { const br = n('div', 'detail-brand'); br.textContent = item.brand; modal.appendChild(br); }
  if (item.description) { const desc = n('div', 'detail-desc'); desc.textContent = item.description; modal.appendChild(desc); }
  if (item.rawText) { const rb = n('div', 'raw-box'); rb.innerHTML = `<div class="raw-label">Extracted Label Text</div><pre>${item.rawText}</pre>`; modal.appendChild(rb); }
  if (item.notes) { const nb = n('div', 'notes-box'); nb.style.borderLeftColor = color; nb.innerHTML = `<div class="notes-label">Your Notes</div><p>${item.notes}</p>`; modal.appendChild(nb); }

  const meta = n('div', 'detail-meta');
  meta.textContent = 'Saved ' + new Date(item.savedAt).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  modal.appendChild(meta);

  const delBtn = document.createElement('button'); delBtn.className = 'btn btn-danger';
  delBtn.textContent = 'Delete Item';
  delBtn.onclick = () => { if (confirm('Delete this item from your collection?')) { state.items = state.items.filter(i => i.id !== item.id); saveItems(state.items); state.modal = null; render(); } };
  modal.appendChild(delBtn);

  bg.appendChild(modal); return bg;
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function n(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function d(tag, style) { const e = document.createElement(tag); if (style) e.style.cssText = style; return e; }
function t(text) { return document.createTextNode(text); }
function fieldLbl(text) { const l = document.createElement('label'); l.className = 'field-label'; l.textContent = text; return l; }

// ── Boot ──────────────────────────────────────────────────────────────────────
checkServer();
setInterval(checkServer, 20000);
render();
</script>
</body>
</html>
